version: 1
environments:
  D0001-EMT:
    web:
      farm:
        app:
          sku_name: B1
          worker_count: 1
          os_type: Windows

      app:
        web:
          deploy_type: code
          https_only: true
          always_on: true
          ftps_state: Disabled
          minimum_tls_version: "1.2"
          app_settings:
            ASPNETCORE_ENVIRONMENT: Development
    network:
      vnet:
        address_space:
          - 10.10.0.0/16
        subnets:
          sn-web-integration:
            address_prefixes:
              - 10.10.1.0/24
          sn-private-endpoint:
            address_prefixes:
              - 10.10.2.0/24

  T0001-EMT:
    web:
      farm:
        app:
          sku_name: B1
          worker_count: 1
          os_type: Windows

      app:
        web:
          deploy_type: code
          https_only: true
          always_on: true
          ftps_state: Disabled
          minimum_tls_version: "1.2"
          app_settings:
            ASPNETCORE_ENVIRONMENT: Test
